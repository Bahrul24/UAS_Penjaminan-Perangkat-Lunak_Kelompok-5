name: CraftApparel CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer Dependencies
        run: composer install --no-interaction

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Verify Java
        run: java -version

      - name: Verify PHP
        run: php -v

      - name: Verify Chrome
        run: google-chrome --version

      - name: Compile Java Sources
        run: |
          javac -cp ".:lib/*" backend/*.java test/*.java

      - name: Start Backend Java
        run: |
          java -cp backend Main &
          sleep 5

      - name: Start PHP Server
        run: |
          php -S localhost:8000 -t frontend &
          sleep 5

      - name: Start ChromeDriver
        run: |
          chromedriver --port=9515 &
          sleep 5

      - name: Run JUnit Tests
        run: |
          java -jar lib/junit-platform-console-standalone-1.13.4.jar execute \
          --class-path backend \
          --class-path test \
          --scan-class-path

      - name: Run PHPUnit Integration Test
        run: |
          php vendor/bin/phpunit test/ApiProxyTest.php

      - name: Run PHPUnit System Test
        run: |
          php vendor/bin/phpunit test/SystemTest.php

      - name: Generate JaCoCo Coverage
        run: |
          java -javaagent:lib/jacocoagent.jar=destfile=jacoco.exec \
          -jar lib/junit-platform-console-standalone-1.13.4.jar execute \
          --class-path backend \
          --class-path test \
          --scan-class-path

      - name: Build JaCoCo Report
        run: |
          java -jar lib/jacococli.jar report jacoco.exec \
          --classfiles backend \
          --sourcefiles backend \
          --html jacoco-report

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: jacoco-report